services:
  mcp-http-bridge:
    build:
      context: .
      dockerfile: Dockerfile.chatgpt
    env_file:
      - .env
    environment:
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3333}
    ports:
      - "127.0.0.1:${MCP_HTTP_PORT:-3333}:3333"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2024.9.1
    command: tunnel --url http://mcp-http-bridge:3333 --no-autoupdate
    depends_on:
      - mcp-http-bridge
    restart: unless-stopped
